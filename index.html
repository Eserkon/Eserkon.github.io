 <!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ESERKON | Dijital Kartvizit</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      background: #0d1b2a;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
    }

    .hero img.big-logo {
      max-width: 220px;
      margin-bottom: 30px;
    }

    .hero img.inline-logo {
      width: 1.2em;
      height: 1.2em;
      vertical-align: middle;
      margin: 0 0.06em;
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(0, 198, 255, 0.7);
      object-fit: contain;
    }

    .eserkon-text {
      font-size: 4.8rem;
      font-weight: 700;
      margin: 10px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.05em;
      animation: heartbeat 1.6s ease-in-out infinite alternate;
    }

    @keyframes heartbeat {
      from {
        transform: scale(1);
        text-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff, 0 0 50px #00c6ff, 0 0 80px #0095ff;
      }
      to {
        transform: scale(1.18);
        text-shadow: 0 0 25px #00ffff, 0 0 50px #00ffff, 0 0 80px #00c6ff, 0 0 140px #0095ff;
      }
    }

    .tagline {
      font-size: 1.8rem;
      letter-spacing: 2px;
      margin: 20px 0 40px;
      font-weight: 600;
      display: flex;
      justify-content: center;
      gap: 8px;
      animation: pulse 3s ease-in-out infinite;
    }

    .tagline span {
      display: inline-block;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); text-shadow: 0 0 10px rgba(255,255,255,0.5); }
      50% { transform: scale(1.1); text-shadow: 0 0 20px #00ff9d, 0 0 30px #ffaa00, 0 0 40px #c084fc; }
    }

    .qr-container {
      position: relative;
      margin-top: 40px;
    }

    .qr-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.4rem;
      font-weight: 600;
      color: white;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
      text-align: center;
      z-index: 2;
      pointer-events: none;
      animation: slideDown 1s ease forwards;
      opacity: 0;
    }

    .qr-overlay .line1 {
      font-size: 1.5rem;
      color: #00eaff;
    }

    @keyframes slideDown {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(-50%, -50%); opacity: 1; }
    }

    .qr-code img {
      width: 280px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.6);
    }
  </style>
</head>
<body>

  <div class="hero">
    <!-- Logo -->
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgEuqMyi9iTUz8Mtp8GN85InHVgANQHOXEAQhjhZHJsilqa9FrWXikcX1pAa7Xi2nQfFDblyewwpkRGiWTxlKOmXWJluZwqaPy5yRodC2AXEuvp5XwV5qLDbhAFJifc7ntFnD8WJ-IkFTfPFrWkZzPV7yiYVyL-HIsr-NVnKpnocHvknEixxC0UhSkMw5BX/s320/TRANSPARAN%20LOGO.png"
         alt="ESERKON Logo" class="big-logo">

    <!-- ESERKON Yazısı (O yerine logo) -->
    <div class="eserkon-text">
      E S E R K
      <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgEuqMyi9iTUz8Mtp8GN85InHVgANQHOXEAQhjhZHJsilqa9FrWXikcX1pAa7Xi2nQfFDblyewwpkRGiWTxlKOmXWJluZwqaPy5yRodC2AXEuvp5XwV5qLDbhAFJifc7ntFnD8WJ-IkFTfPFrWkZzPV7yiYVyL-HIsr-NVnKpnocHvknEixxC0UhSkMw5BX/s320/TRANSPARAN%20LOGO.png"
           alt="O" class="inline-logo">
      N
    </div>

    <!-- Alt Başlık: Animasyonlu -->
    <div class="tagline">
      <span class="green">EĞİTİM</span> | 
      <span class="orange">SOSYAL ETKİNLİK</span> | 
      <span class="white">ve</span> | 
      <span class="purple">REHBERLİK KONSEYİ</span>
    </div>

    <!-- QR Kodu + Üzerinde Yazı -->
    <div class="qr-container">
      <div class="qr-overlay">
        <div class="line1">📲 QR Kodu Tarat</div>
      </div>
      <img class="qr-code" 
           src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgEuqMyi9iTUz8Mtp8GN85InHVgANQHOXEAQhjhZHJsilqa9FrWXikcX1pAa7Xi2nQfFDblyewwpkRGiWTxlKOmXWJluZwqaPy5yRodC2AXEuvp5XwV5qLDbhAFJifc7ntFnD8WJ-IkFTfPFrWkZzPV7yiYVyL-HIsr-NVnKpnocHvknEixxC0UhSkMw5BX/s320/QR.png" 
           alt="Dijital Kartvizit QR">
    </div>
  </div>

</body>
</html>
