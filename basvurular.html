 <div style="font-family:Arial, sans-serif; max-width:800px; margin:0 auto; padding:20px; background:#f0f8ff; border-radius:12px; box-shadow:0 0 15px rgba(0,0,0,0.1);">

  <!-- Form sonrası mesaj -->
  <div id="success-message" style="display:none; text-align:center; padding:20px; margin-top:20px; background:#d4edda; color:#155724; border-radius:10px; font-size:16px; border:1px solid #c3e6cb;">
    Mesajınız başarıyla gönderildi. <br> En kısa zamanda sizinle iletişime geçilecektir. Teşekkür ederiz!
  </div>

  <!-- Sekme Kontrolü ve Form Gönderim JS -->
  <script>
    function openTab(tabName) {
      const tabs = document.getElementsByClassName("tab-content");
      for (let i = 0; i < tabs.length; i++) {
        tabs[i].style.display = "none";
      }
      document.getElementById(tabName).style.display = "block";

      const buttons = document.getElementsByClassName("tab-btn");
      for (let i = 0; i < buttons.length; i++) {
        buttons[i].classList.remove("active");
      }
      event.currentTarget.classList.add("active");
    }

    // Form gönderim sonrası mesaj
    document.querySelectorAll("form").forEach(form => {
      form.addEventListener("submit", function(e) {
        e.preventDefault();
        fetch(this.action, {
          method: "POST",
          body: new FormData(this),
          headers: {
            "Accept": "application/json"
          }
        }).then(response => {
          if (response.ok) {
            this.reset();
            document.getElementById("success-message").style.display = "block";
            setTimeout(() => {
              document.getElementById("success-message").style.display = "none";
            }, 5000);
          } else {
            alert("Bir hata oluştu. Lütfen tekrar deneyin.");
          }
        });
      });
    });
  </script>

  <style>
    .tab-btn {
      padding:10px 16px; background:#e0e0e0; border:none; border-radius:6px; cursor:pointer; font-size:14px; color:#333; transition: all 0.3s;
    }
    .tab-btn.active { background:#006d77; color:white; }
    .tab-btn:hover { background:#ccc; }
    input, select, textarea, button { font-family:Arial, sans-serif; }
  </style>
