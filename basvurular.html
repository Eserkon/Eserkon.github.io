 <div style="font-family:Arial, sans-serif; max-width:850px; margin:0 auto; padding:20px; background:#f0f8ff; border-radius:12px; box-shadow:0 0 15px rgba(0,0,0,0.1);">

<h1 style="text-align:center; color:#006d77;">Bize Katıl</h1>

<div id="successMessage" style="display:none; background:#00c853; color:white; padding:12px; border-radius:8px; text-align:center; margin-bottom:15px;">
✅ Mesajınız başarıyla iletilmiştir.
</div>

<!-- BUTONLAR -->
<div style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:20px;">
<button onclick="openTab('ogretmen')" style="background:#00b4d8;color:white;padding:10px 16px;border:none;border-radius:6px;">👨‍🏫 Gönüllü Öğretmen</button>
<button onclick="openTab('ogrenci')" style="background:#2ecc71;color:white;padding:10px 16px;border:none;border-radius:6px;">🎓 Öğrenci</button>
<button onclick="openTab('gonullu')" style="background:#9b59b6;color:white;padding:10px 16px;border:none;border-radius:6px;">🤝 Üye Ol</button>
<button onclick="openTab('destek')" style="background:#e67e22;color:white;padding:10px 16px;border:none;border-radius:6px;">💖 Destek Ol</button>
</div>

<!-- ÖĞRETMEN -->
<div id="ogretmen" class="tab-content" style="display:block; padding:20px; background:white; border-radius:10px;">
<form action="https://formspree.io/f/mgvglwbz" method="POST" onsubmit="sendForm(event)">
<input type="text" name="adsoyad" placeholder="Ad Soyad" required style="width:100%;padding:10px;margin:6px 0;">
<input type="tel" name="telefon" placeholder="Telefon" required style="width:100%;padding:10px;margin:6px 0;">
<input type="email" name="email" placeholder="E-posta" required style="width:100%;padding:10px;margin:6px 0;">
<input type="text" name="sehir" placeholder="Şehir" required style="width:100%;padding:10px;margin:6px 0;">
<button type="submit" style="width:100%;padding:12px;background:#00b4d8;color:white;">Gönder</button>
</form>
</div>

<!-- ÖĞRENCİ -->
<div id="ogrenci" class="tab-content" style="display:none; padding:20px; background:white; border-radius:10px;">
<form action="https://formspree.io/f/mgvglwbz" method="POST" onsubmit="sendForm(event)">

<input type="text" name="adsoyad" placeholder="Ad Soyad" required style="width:100%;padding:10px;margin:6px 0;">
<input type="tel" name="telefon" placeholder="Telefon" required style="width:100%;padding:10px;margin:6px 0;">
<input type="email" name="email" placeholder="E-posta" required style="width:100%;padding:10px;margin:6px 0;">
<input type="text" name="okul" placeholder="Okulunuz" required style="width:100%;padding:10px;margin:6px 0;">
<input type="text" name="bolum" placeholder="Bölümünüz" required style="width:100%;padding:10px;margin:6px 0;">

<select name="talep" onchange="ogrenciSecildi(this.value)" required style="width:100%;padding:10px;margin:6px 0;">
<option value="">Talebiniz</option>
<option>Burs</option>
<option>Etüt</option>
<option>Barınma</option>
<option>Yemek</option>
</select>

<!-- SADECE BURS SEÇİLİRSE -->
<div id="bursDetay" style="display:none;">
<select name="gelir" style="width:100%;padding:10px;margin:6px 0;">
<option>Aylık Gelir</option>
<option>0-5K</option>
<option>5K-10K</option>
<option>10K+</option>
</select>

<select name="aile" style="width:100%;padding:10px;margin:6px 0;">
<option>Aile Durumu</option>
<option>Anne-Baba birlikte</option>
<option>Anne yok</option>
<option>Baba yok</option>
<option>Yok</option>
</select>

<textarea name="burs_neden" placeholder="Burs alma nedeniniz..." style="width:100%;padding:10px;margin:6px 0;"></textarea>
</div>

<button type="submit" style="width:100%;padding:12px;background:#2ecc71;color:white;">Gönder</button>
</form>
</div>

<!-- GÖNÜLLÜ -->
<div id="gonullu" class="tab-content" style="display:none; padding:20px; background:white; border-radius:10px;">
<form action="https://formspree.io/f/mgvglwbz" method="POST" onsubmit="sendForm(event)">
<input type="text" name="adsoyad" placeholder="Ad Soyad" required style="width:100%;padding:10px;margin:6px 0;">
<input type="email" name="email" placeholder="E-posta" required style="width:100%;padding:10px;margin:6px 0;">
<button type="submit" style="width:100%;padding:12px;background:#9b59b6;color:white;">Başvur</button>
</form>
</div>

<!-- DESTEK -->
<div id="destek" class="tab-content" style="display:none; padding:20px; background:white; border-radius:10px;">
<form action="https://formspree.io/f/mgvglwbz" method="POST" onsubmit="sendForm(event)">

<input type="text" name="adsoyad" placeholder="Ad Soyad" required style="width:100%;padding:10px;margin:6px 0;">
<input type="email" name="email" placeholder="E-posta" required style="width:100%;padding:10px;margin:6px 0;">

<select name="destek_turu" onchange="destekSecildi(this.value)" required style="width:100%;padding:10px;margin:6px 0;">
<option value="">Destek Türü</option>
<option>Finansal Destek</option>
<option>Malzeme Bağışı</option>
<option>Zaman / Gönüllülük</option>
<option>Eğitim Desteği</option>
<option>Ulaşım</option>
<option>Konaklama</option>
<option>Yemek</option>
<option>Burs Desteği</option>
</select>

<!-- BURS DESTEK -->
<div id="bursAlan" style="display:none;">
<input type="text" value="TR00 0000 0000 0000 0000 0000 00" readonly style="width:100%;padding:10px;margin:6px 0;">
<input type="number" placeholder="Tutar ₺" style="width:100%;padding:10px;margin:6px 0;">
</div>

<button type="submit" style="width:100%;padding:12px;background:#e67e22;color:white;">Gönder</button>
</form>
</div>

<script>
function openTab(t){
document.querySelectorAll('.tab-content').forEach(x=>x.style.display='none');
document.getElementById(t).style.display='block';
}

function sendForm(e){
e.preventDefault();
fetch(e.target.action,{method:'POST',body:new FormData(e.target),headers:{'Accept':'application/json'}})
.then(r=>{if(r.ok){document.getElementById('successMessage').style.display='block';e.target.reset();}});
}

function ogrenciSecildi(v){
document.getElementById("bursDetay").style.display = (v==="Burs")?"block":"none";
}

function destekSecildi(v){
document.getElementById("bursAlan").style.display = (v==="Burs Desteği")?"block":"none";
}
</script>

</div>
