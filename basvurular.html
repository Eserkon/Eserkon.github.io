<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bize Katıl - Eserkon</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body {
      background: #f0f8ff;
      color: #333;
      line-height: 1.6;
    }
    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #006d77;
      margin-bottom: 10px;
      font-size: 28px;
    }
    p.intro {
      text-align: center;
      color: #555;
      margin-bottom: 30px;
      font-size: 16px;
    }

    /* SEKMELER */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 12px 20px;
      border: none;
      border-radius: 50px;
      background: #e0f7fa;
      color: #006d77;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      min-width: 140px;
    }
    .tab-btn:hover, .tab-btn.active {
      background: #006d77;
      color: white;
      transform: translateY(-2px);
    }

    /* FORM KUTULARI */
    .tab-content {
      display: none;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      margin-top: 10px;
      border: 1px solid #e0f7fa;
    }
    .tab-content.active {
      display: block;
    }

    /* GÖRSEL */
    .form-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .form-header img {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
    }
    .form-header h2 {
      color: #006d77;
      margin: 0;
    }

    /* BAŞARI MESAJI */
    #successMessage {
      display: none;
      background: #00c853;
      color: white;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
      margin-bottom: 20px;
    }

    /* FORM STİLİ */
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #333;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }
    textarea {
      height: 100px;
      resize: vertical;
    }
    button.btn {
      background: #006d77;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 8px;
      width: 100%;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    button.btn:hover {
      background: #005f66;
    }

    /* MOBİL */
    @media (max-width: 600px) {
      .tab-btn { width: 100%; }
      .container { padding: 10px; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>✨ Bize Katıl</h1>
  <p class="intro">Aşağıdaki sekmelerden başvuru türünü seçin.</p>

  <!-- BAŞARI MESAJI -->
  <div id="successMessage">✅ Mesajınız başarıyla iletildi!</div>

  <!-- SEKMELER -->
  <div class="tabs">
    <button class="tab-btn active" onclick="openTab('ogretmen')">🧑‍🏫 Öğretmen</button>
    <button class="tab-btn" onclick="openTab('ogrenci')">🎓 Öğrenci</button>
    <button class="tab-btn" onclick="openTab('gonullu')">🤝 Üye / Gönüllü</button>
    <button class="tab-btn" onclick="openTab('destek')">💖 Destek Ol</button>
  </div>

  <!-- GÖNÜLLÜ ÖĞRETMEN -->
  <div id="ogretmen" class="tab-content active">
    <div class="form-header">
      <img src="https://source.unsplash.com/random/800x400/?teacher,education" alt="Gönüllü Öğretmen">
      <h2>Gönüllü Öğretmen Başvurusu</h2>
    </div>
    <form onsubmit="sendForm(event, 'ogretmen')">
      <input type="hidden" name="form_type" value="Gönüllü Öğretmen">
      <div class="form-group"><input type="text" name="adsoyad" placeholder="Ad Soyad *" required></div>
      <div class="form-group"><input type="tel" name="telefon" placeholder="Telefon *" required></div>
      <div class="form-group"><input type="email" name="email" placeholder="E-posta *" required></div>
      <div class="form-group"><input type="text" name="sehir" placeholder="Şehir *" required></div>
      <div class="form-group">
        <select name="brans" required><option value="">Branş Seçiniz *</option>
          <option>Matematik</option><option>Türkçe</option><option>İngilizce</option>
          <option>Fen Bilimleri</option><option>Sosyal Bilgiler</option><option>Diğer</option>
        </select>
      </div>
      <div class="form-group">
        <select name="seviye" required><option value="">Seviye *</option>
          <option>İlkokul</option><option>Ortaokul</option><option>Lise</option><option>Üniversite</option>
        </select>
      </div>
      <div class="form-group"><textarea name="mesaj" placeholder="Kendinizi tanıtın..." required></textarea></div>
      <button type="submit" class="btn">Başvuruyu Gönder</button>
    </form>
  </div>

  <!-- ÖĞRENCİ -->
  <div id="ogrenci" class="tab-content">
    <div class="form-header">
      <img src="https://source.unsplash.com/random/800x400/?student,study" alt="Öğrenci Üye Ol">
      <h2>Öğrenci Üye / Burs Başvurusu</h2>
    </div>
    <form onsubmit="sendForm(event, 'ogrenci')">
      <input type="hidden" name="form_type" value="Öğrenci">
      <div class="form-group"><input type="text" name="adsoyad" placeholder="Ad Soyad *" required></div>
      <div class="form-group"><input type="tel" name="telefon" placeholder="Telefon *" required></div>
      <div class="form-group"><input type="email" name="email" placeholder="E-posta *" required></div>
      <div class="form-group"><input type="text" name="okul" placeholder="Okulunuz *" required></div>
      <div class="form-group"><input type="text" name="bolum" placeholder="Bölümünüz"></div>
      <div class="form-group">
        <select name="sinif" required><option value="">Sınıfınız *</option>
          <option>Hazırlık</option><option>1</option><option>2</option><option>3</option><option>4</option>
        </select>
      </div>
      <div class="form-group">
        <label><input type="checkbox" name="burs_iste" onchange="toggleBurs(this)"> Burs Başvurusu</label>
      </div>
      <div id="bursForm" style="display:none; padding:15px; background:#f8f9fa; border-radius:8px; margin:10px 0;">
        <h3 style="color:#006d77;">Burs Bilgileri</h3>
        <div class="form-group"><select name="engel"><option>Engel Durumu</option><option>Yok</option><option>Var</option></select></div>
        <div class="form-group"><select name="kardes_sayisi"><option>Okuyan Kardeş Sayısı</option><option>Yok</option><option>1</option><option>2</option><option>3+</option></select></div>
        <div class="form-group"><select name="aylik_gelir"><option>Aylık Hane Geliri</option><option>0-10k</option><option>10k-20k</option><option>20k+</option></select></div>
        <div class="form-group"><textarea name="aciklama" placeholder="Ek bilgi (isteğe bağlı)"></textarea></div>
      </div>
      <button type="submit" class="btn">Başvur</button>
    </form>
  </div>

  <!-- ÜYE / GÖNÜLLÜ -->
  <div id="gonullu" class="tab-content">
    <div class="form-header">
      <img src="https://source.unsplash.com/random/800x400/?volunteer,team" alt="Üye Ol">
      <h2>Üye / Gönüllü Başvurusu</h2>
    </div>
    <form onsubmit="sendForm(event, 'gonullu')">
      <input type="hidden" name="form_type" value="Gönüllü">
      <div class="form-group"><input type="text" name="adsoyad" placeholder="Ad Soyad *" required></div>
      <div class="form-group"><input type="tel" name="telefon" placeholder="Telefon *" required></div>
      <div class="form-group"><input type="email" name="email" placeholder="E-posta *" required></div>
      <div class="form-group"><input type="text" name="meslek" placeholder="Meslek *" required></div>
      <div class="form-group">
        <select name="ilgi" required><option>İlgi Alanı *</option>
          <option>Eğitim</option><option>Sosyal Yardım</option><option>Çevre</option><option>Diğer</option>
        </select>
      </div>
      <div class="form-group"><textarea name="mesaj" placeholder="Neden katılmak istiyorsunuz?" required></textarea></div>
      <button type="submit" class="btn">Başvur</button>
    </form>
  </div>

  <!-- DESTEK OL -->
  <div id="destek" class="tab-content">
    <div class="form-header">
      <img src="https://source.unsplash.com/random/800x400/?donation,help" alt="Destek Ol">
      <h2>Destek Ol</h2>
    </div>
    <form onsubmit="sendForm(event, 'destek')">
      <input type="hidden" name="form_type" value="Destek">
      <div class="form-group"><input type="text" name="adsoyad" placeholder="Ad Soyad *" required></div>
      <div class="form-group"><input type="email" name="email" placeholder="E-posta *" required></div>
      <div class="form-group"><input type="tel" name="telefon" placeholder="Telefon (isteğe bağlı)"></div>
      <div class="form-group">
        <select name="destek_turu" required><option>Destek Türü *</option>
          <option>Burs Desteği</option><option>Finansal Destek</option><option>Malzeme Desteği</option><option>Gönüllülük</option>
        </select>
      </div>
      <div class="form-group">
        <select name="odeme_yontemi" onchange="toggleIBAN(this.value)"><option>Ödeme Yöntemi</option>
          <option>EFT_Havale</option><option>Elden</option><option>KrediKarti</option>
        </select>
      </div>
      <div id="ibanAlani" style="display:none; padding:15px; background:#e0f7fa; border-radius:8px; margin:10px 0;">
        <p><strong>IBAN:</strong> TR00 0000 0000 0000 0000 0000 00</p>
        <small>Lütfen açıklama kısmına adınızı yazın.</small>
      </div>
      <div class="form-group"><textarea name="mesaj" placeholder="Destekle ilgili notlarınız"></textarea></div>
      <button type="submit" class="btn">Destek Talebini Gönder</button>
    </form>
  </div>

</div>

<!-- JS -->
<script>
  function openTab(tabName) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
    document.querySelector(`[onclick="openTab('${tabName}')"]`).classList.add('active');
  }

  function sendForm(e, tab) {
    e.preventDefault();
    const form = e.target;
    fetch('https://formspree.io/f/xpqowknj', {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    }).then(r => {
      if (r.ok) {
        form.reset();
        document.getElementById('successMessage').style.display = 'block';
        setTimeout(() => { document.getElementById('successMessage').style.display = 'none'; }, 5000);
        if (tab === 'ogrenci') document.getElementById('bursForm').style.display = 'none';
        if (tab === 'destek') document.getElementById('ibanAlani').style.display = 'none';
      }
    }).catch(() => alert('Hata oluştu. Lütfen tekrar deneyin.'));
  }

  function toggleBurs(cb) {
    document.getElementById('bursForm').style.display = cb.checked ? 'block' : 'none';
  }
  function toggleIBAN(val) {
    document.getElementById('ibanAlani').style.display = val === 'EFT_Havale' ? 'block' : 'none';
  }
</script>

</body>
</html>
